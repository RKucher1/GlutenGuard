name: glutenguard
description: GlutenGuard — gluten-free safety scanner for celiac disease
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # Scanning
  mobile_scanner: ^5.0.0
  google_mlkit_text_recognition: ^0.13.0

  # State management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # Persistence
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.0
  path: ^1.9.0
  shared_preferences: ^2.2.0

  # Networking
  dio: ^5.4.0
  connectivity_plus: ^6.0.0

  # Monetisation
  purchases_flutter: ^7.0.0

  # Utilities
  freezed_annotation: ^2.4.0
  json_annotation: ^4.9.0
  go_router: ^13.0.0
  share_plus: ^9.0.0
  image_picker: ^1.1.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0
  drift_dev: ^2.18.0
  freezed: ^2.5.0
  json_serializable: ^6.8.0
  mocktail: ^1.0.0
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/gluten_knowledge_base.json
    - assets/gluten_products_kb.json
    - assets/pantry_ingredients.json
